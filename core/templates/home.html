<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Meu Projeto</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
      }

      header {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        background: rgba(0, 0, 0, 0.3);
      }

      header h2 {
        color: #38bdf8;
      }

      nav a {
        margin-left: 20px;
        text-decoration: none;
        color: white;
      }

      .hero {
        text-align: center;
        padding: 100px 20px;
      }

      .hero h1 {
        font-size: 50px;
      }

      .hero p {
        margin-top: 15px;
        color: #94a3b8;
      }

      .btn {
        display: inline-block;
        margin-top: 30px;
        padding: 15px 30px;
        background: #38bdf8;
        color: black;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
      }

      .services {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 60px 20px;
        flex-wrap: wrap;
      }

      .card {
        background: #1e293b;
        padding: 30px;
        border-radius: 12px;
        width: 250px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-10px);
        background: #334155;
      }

      footer {
        text-align: center;
        padding: 20px;
        background: #020617;
      }
    </style>
  </head>

  <body>
    <header>
      <h2>VJ Tech</h2>
      <nav>
        <a href="#">Início</a>
        <a href="#">Serviços</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>

    <section class="hero">
      <h1>
        🚀
        <h1>FUNCIONOU 🔥</h1>
      </h1>
      <p>Deploy profissional com Django + Render</p>
      <a href="/admin" class="btn">Começar</a>
    </section>

    <section class="services">
      <div class="card">
        <h3>⚡ Rápido</h3>
        <p>Deploy otimizado e performático</p>
      </div>

      <div class="card">
        <h3>🔒 Seguro</h3>
        <p>Configuração pronta para produção</p>
      </div>

      <div class="card">
        <h3>🌐 Online</h3>
        <p>Seu projeto acessível de qualquer lugar</p>
      </div>
    </section>

    <footer>
      <p>© 2026 VJ Tech</p>
    </footer>
  </body>
</html>
